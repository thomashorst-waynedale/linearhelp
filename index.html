<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friendly Equation Solver - CAS Version</title>
    <script src="https://unpkg.com/mathlive"></script>
    <script src="https://unpkg.com/@cortex-js/compute-engine"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa; background-image: radial-gradient(#e9ecef 1px, transparent 1px);
            background-size: 20px 20px; display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 40px 20px;
        }
        .container {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.06); width: 100%; max-width: 600px;
        }
        h2 { margin-top: 0; color: #ff6b6b; text-align: center; font-size: 28px; margin-bottom: 10px; }
        .instructions { color: #7f8c8d; text-align: center; margin-bottom: 25px; line-height: 1.5; font-size: 16px; }
        math-field {
            font-size: 22px; padding: 15px; border: 3px solid #f1f3f5; border-radius: 16px; 
            outline: none; background: #ffffff; width: 100%; box-sizing: border-box;
        }
        math-field:focus-within { border-color: #4ecdc4; }
        .setup-area { margin-bottom: 20px; }
        .input-area {
            display: none; flex-direction: column; gap: 15px; background: #f1fdfc; 
            padding: 20px; border-radius: 16px; border: 2px dashed #4ecdc4; margin-top: 20px;
        }
        .btn-container { display: flex; gap: 8px; width: 100%; }
        .btn {
            color: white; border: none; padding: 14px 10px; border-radius: 50px; 
            cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s ease; text-align: center;
        }
        .btn-start { background: #ff6b6b; width: 100%; font-size: 16px; }
        .btn-start:hover { background: #ff5252; }
        .btn-step { background: #4ecdc4; flex: 2; }
        .btn-step:hover { background: #45b7af; }
        .btn-undo { background: #ced4da; color: #495057; flex: 1; }
        .btn-reset { background: #f1f3f5; color: #adb5bd; flex: 1; border: 1px solid #dee2e6; }
        #message { margin-top: 20px; font-weight: bold; font-size: 16px; text-align: center; padding: 12px; border-radius: 12px; }
        ul { list-style-type: none; padding: 0; margin-top: 20px; width: 100%; }
        .step-item { display: flex; align-items: center; margin-bottom: 12px; background: #f8f9fa; border-radius: 16px; padding: 8px 15px; }
        .step-number { font-weight: bold; color: #ced4da; margin-right: 15px; font-size: 20px; }
        .step-item math-field { border: none; background: transparent; padding: 5px; box-shadow: none; pointer-events: none; }
        .victory-mode { background-color: #f1c40f; }
        .victory-text { font-size: 22px; color: #d35400; background: #fef9e7; border: 2px solid #f1c40f; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h2>✨ Equation Explorer</h2>
    <div class="instructions">Type an equation below to start (e.g., 2x + 5 = 11). Fractions are welcome!</div>

    <div class="setup-area" id="setupArea">
        <math-field id="setupInput" style="margin-bottom: 15px;"></math-field>
        <button class="btn btn-start" onclick="startNewProblem()">Start Solving</button>
    </div>

    <ul id="stepList"></ul>

    <div class="input-area" id="inputArea">
        <math-field id="stepInput" onkeydown="handleEnter(event)"></math-field>
        <div class="btn-container">
            <button class="btn btn-step" onclick="submitStep()">Check Move</button>
            <button class="btn btn-undo" onclick="undoStep()">Undo</button>
            <button class="btn btn-reset" onclick="resetProblem()">Reset</button>
        </div>
    </div>
    <div id="message"></div>
</div>

<script>
    // Initialize the Math Engine
    const ce = new ComputeEngine.ComputeEngine();
    let steps = [];
    let isSolved = false;

    function handleEnter(e) { if (e.key === 'Enter') { e.preventDefault(); submitStep(); } }

    // --- NEW: ROBUST MATH EVALUATOR ---
    function evaluateSide(latexExpr, xVal) {
        ce.assign('x', xVal); // Temporarily set x to a specific number
        const val = ce.parse(latexExpr).N().valueOf(); // Calculate the numerical result
        return typeof val === 'number' ? val : NaN;
    }

    function checkEquivalence(oldEqLatex, newEqLatex) {
        let oldSides = oldEqLatex.split('=');
        let newSides = newEqLatex.split('=');
        if(oldSides.length !== 2 || newSides.length !== 2) return false;

        // Test at two random, non-integer points to avoid accidental overlaps
        const x1 = 3.14159;
        const x2 = 2.71828;

        // Calculate (Left - Right) for both equations
        let oldF1 = evaluateSide(oldSides[0], x1) - evaluateSide(oldSides[1], x1);
        let oldF2 = evaluateSide(oldSides[0], x2) - evaluateSide(oldSides[1], x2);
        
        let newF1 = evaluateSide(newSides[0], x1) - evaluateSide(newSides[1], x1);
        let newF2 = evaluateSide(newSides[0], x2) - evaluateSide(newSides[1], x2);

        // If equations are algebraically equivalent, the ratio of their outputs will be constant
        if (Math.abs(newF1) < 0.0001 || Math.abs(newF2) < 0.0001) return false; 
        
        let ratio1 = oldF1 / newF1;
        let ratio2 = oldF2 / newF2;

        return Math.abs(ratio1 - ratio2) < 0.001; 
    }

    function isProperlySolved(eqLatex) {
        let parts = eqLatex.split('=');
        if (parts.length !== 2) return false;
        
        let leftStr = parts[0].trim().toLowerCase();
        let rightStr = parts[1].trim().toLowerCase();
        
        let valSide = null;
        if (leftStr === 'x') valSide = parts[1];
        else if (rightStr === 'x') valSide = parts[0];
        else return false;

        // If 'x' is on one side, ensure the other side evaluates to a constant number
        let val1 = evaluateSide(valSide, 1);
        let val2 = evaluateSide(valSide, 100);
        return (Math.abs(val1 - val2) < 0.0001 && !isNaN(val1));
    }

    // --- APP LOGIC ---
    function startNewProblem() {
        const rawLatex = document.getElementById('setupInput').value;
        if (!rawLatex.includes('=')) { showMessage("Please include an '=' sign.", "error"); return; }
        
        steps = [rawLatex]; 
        isSolved = false;
        
        document.getElementById('inputArea').style.display = 'flex';
        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('setupInput').value = '';
        document.getElementById('stepList').innerHTML = '';
        showMessage("Awesome! What's your first step?", "success");
        renderSteps();
        setTimeout(() => document.getElementById('stepInput').focus(), 50);
    }

    function submitStep() {
        if (isSolved) return;
        const newLatex = document.getElementById('stepInput').value;
        if (!newLatex.includes('=')) { showMessage("Every step needs an '=' sign.", "error"); return; }
        
        const oldLatex = steps[steps.length - 1];
        if (newLatex === oldLatex) { showMessage("That looks exactly like the last step!", "error"); return; }

        // THE MAGIC CHECK: Ask the CAS if the math move is logically valid
        if (!checkEquivalence(oldLatex, newLatex)) {
            showMessage("Oops! That move threw the equation off balance.", "error");
            return;
        }

        steps.push(newLatex);
        renderSteps();
        document.getElementById('stepInput').value = ""; 
        document.getElementById('stepInput').focus();
        showMessage("Great move! Keep going.", "success");
        
        if (isProperlySolved(newLatex)) triggerVictory();
    }

    function triggerVictory() {
        isSolved = true;
        document.body.classList.add('victory-mode');
        document.getElementById('inputArea').style.display = 'none';
        showMessage("🎉 You solved it! 🎉", "victory-text");
        
        const resetBtn = document.createElement('button');
        resetBtn.id = 'finalResetBtn'; resetBtn.className = 'btn btn-start';
        resetBtn.innerText = 'Solve Another'; resetBtn.style.marginTop = '15px';
        resetBtn.onclick = resetProblem; 
        document.getElementById('mainContainer').appendChild(resetBtn);
    }

    function undoStep() {
        if (steps.length <= 1) { showMessage("You're already at the start!", "error"); return; }
        steps.pop(); isSolved = false;
        document.body.classList.remove('victory-mode');
        document.getElementById('inputArea').style.display = 'flex';
        const resetBtn = document.getElementById('finalResetBtn'); if (resetBtn) resetBtn.remove();
        renderSteps(); showMessage("Step undone.", "success");
    }

    function resetProblem() {
        steps = []; isSolved = false;
        document.body.classList.remove('victory-mode');
        document.getElementById('setupArea').style.display = 'block';
        document.getElementById('inputArea').style.display = 'none';
        document.getElementById('setupInput').value = '';
        document.getElementById('stepList').innerHTML = '';
        const resetBtn = document.getElementById('finalResetBtn'); if (resetBtn) resetBtn.remove();
        showMessage("", "");
        setTimeout(() => document.getElementById('setupInput').focus(), 50);
    }

    function renderSteps() {
        const list = document.getElementById('stepList');
        list.innerHTML = '';
        steps.forEach((latexStr, index) => {
            const li = document.createElement('li');
            li.className = 'step-item';
            li.innerHTML = `<span class="step-number">${index + 1}</span><math-field read-only>${latexStr}</math-field>`;
            list.appendChild(li);
        });
    }

    function showMessage(msg, type) {
        const msgEl = document.getElementById('message'); msgEl.innerText = msg;
        if (type === 'error') { msgEl.style.backgroundColor = '#ffe3e3'; msgEl.style.color = '#c92a2a'; } 
        else if (type === 'success') { msgEl.style.backgroundColor = '#e3fafc'; msgEl.style.color = '#0b7285'; }
        else { msgEl.className = type; msgEl.style.backgroundColor = 'transparent'; }
    }
</script>

</body>
</html>
